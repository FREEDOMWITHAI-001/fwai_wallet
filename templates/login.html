{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <svg class="mx-auto h-12 w-12 text-brand-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
            <h2 class="mt-4 text-2xl font-bold text-white">Sign in to SecureVault</h2>
            <p class="mt-2 text-sm text-gray-400">Manage your secrets securely</p>
        </div>

        <div class="bg-gray-900 rounded-xl border border-gray-800 p-8">
            <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" value="{{ username | default('', true) }}" required autofocus
                           class="block w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-2.5 text-white placeholder-gray-500 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 focus:outline-none transition">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                           class="block w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-2.5 text-white placeholder-gray-500 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 focus:outline-none transition">
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-500 focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 focus:ring-offset-gray-900 focus:outline-none transition">
                    Sign in
                </button>
            </form>
        </div>

        <p class="mt-6 text-center text-sm text-gray-400">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="font-medium text-brand-400 hover:text-brand-300 transition">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
